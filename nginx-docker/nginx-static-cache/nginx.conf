events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance optimization for transferring files directly from disk
    sendfile        on;
    tcp_nopush      on;

    server {
        listen 83; # Using port 83 for this project
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Route for normal website pages
        location / {
            try_files $uri $uri/ =404;
        }

        # Route specifically targeting static media assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            # Instruct browsers to store these assets for 7 days
            expires 7d;
            add_header Cache-Control "public, no-transform";
            add_header X-Cache-Status "HIT - Served Directly From Nginx Cache";
        }
    }
}
