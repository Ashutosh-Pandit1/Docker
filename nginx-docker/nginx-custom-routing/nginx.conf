events {
    worker_connections 1024;
}

http {
    # Mocking two upstream microservice application layers
    upstream search_service {
        server 127.0.0.1:9001;
    }

    upstream payment_service {
        server 127.0.0.1:9002;
    }

    server {
        listen 84; # Using port 84 for this project
        server_name localhost;

        # Global entry route
        location / {
            add_header Content-Type text/plain;
            return 200 'Welcome to the Main Gateway. Use /search or /payment to route your traffic.';
        }

        # Path-based routing rule 1: Routes all /search paths
        location /search {
            proxy_pass http://search_service/;
            proxy_set_header Host $host;
        }

        # Path-based routing rule 2: Routes all /payment paths
        location /payment {
            proxy_pass http://payment_service/;
            proxy_set_header Host $host;
        }
    }

    # Isolated Mock Microservice 1 (Search Engine Core)
    server {
        listen 9001;
        location / {
            add_header Content-Type application/json;
            return 200 '{"service": "search_microservice", "results": ["item1", "item2"], "status": "online"}';
        }
    }

    # Isolated Mock Microservice 2 (Payment Gateway Core)
    server {
        listen 9002;
        location / {
            add_header Content-Type application/json;
            return 200 '{"service": "payment_microservice", "transaction": "authorized", "status": "online"}';
        }
    }
}
