events { 
    worker_connections 1024; 
}

http {
    # Define a group of backend servers for load balancing
    upstream my_backend_servers {
        # Round-robin algorithm is used by default
        server 127.0.0.1:8081;
        server 127.0.0.1:8082;
    }

    server {
        listen 81;
        server_name localhost;

        # Root route - routes traffic to our load-balanced backend
        location / {
            proxy_pass http://my_backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Custom Error Page Configuration
        error_page 500 502 503 504 /custom_50x.html;
        location = /custom_50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # Mock Backend Server 1
    server {
        listen 8081;
        location / {
            root /usr/share/nginx/html/app1;
            index index.html;
        }
    }

    # Mock Backend Server 2
    server {
        listen 8082;
        location / {
            root /usr/share/nginx/html/app2;
            index index.html;
        }
    }
}
