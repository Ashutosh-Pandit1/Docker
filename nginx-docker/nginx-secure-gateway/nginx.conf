events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Define a rate limiting zone based on IP address (allocates 10MB memory)
    # Allows a maximum rate of 2 requests per second (2r/s)
    limit_req_zone $binary_remote_addr zone=api_limit_zone:10m rate=2r/s;

    server {
        listen 82; # Using port 82 since your first project uses 81
        server_name localhost;

        # Define the directory where custom error pages live
        root /usr/share/nginx/html;

        # Route 1: Secured API Route with Rate Limiting
        location /api/ {
            # Apply the rate limiting rule here
            # burst=3 means 3 extra requests can wait in queue before failing
            limit_req zone=api_limit_zone burst=3 nodelay;
            
            # Simple mock response text directly from Nginx
            add_header Content-Type application/json;
            return 200 '{"status": "success", "message": "Secure API endpoint reached successfully!"}';
        }

        # Route 2: Security rule blocking access to sensitive system/env files
        location ~ /\.(env|git|ht) {
            deny all;
        }

        # Custom Error Page mappings
        error_page 429 /429.html;
        error_page 403 /403.html;

        location = /429.html {
            internal;
        }

        location = /403.html {
            internal;
        }
    }
}
